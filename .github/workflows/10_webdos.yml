name: Deploy TaskTonic Documentation

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material pymdown-extensions

      - name: Build site
        run: mkdocs build

      - name: Copy ttContext.md to site
        run: cp docs/assets/ttContext.md site/assets/ttContext.md

      - name: Add CNAME file
        run: echo "tasktonic.dev" > site/CNAME

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
