name: Deploy TaskTonic Documentation

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material pymdown-extensions

      - name: Build site
        run: mkdocs build

      - name: Copy ttContext.md to site
        run: |
          echo "=== Checking if ttContext.md exists in root ==="
          ls -la ttContext.md || echo "ttContext.md not found in root"
          echo "=== Checking if site/assets directory exists ==="
          ls -la site/assets/ || echo "site/assets directory not found"
          echo "=== Copying ttContext.md ==="
          cp ttContext.md site/assets/ttContext.md
          echo "=== Verifying copy ==="
          ls -la site/assets/ttContext.md || echo "Copy failed"

      - name: Add CNAME file
        run: echo "tasktonic.dev" > site/CNAME

      - name: List files in site directory
        run: |
          echo "=== Files in site directory ==="
          find site -type f
          echo "=== Checking if ttContext.md exists ==="
          ls -la site/assets/ || echo "assets directory not found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
